          enum:
            - UNASSIGNED_RESOURCES
            - VIEWERS
          default: UNASSIGNED_RESOURCES
        - name: verb
          in: query
          required: false
          type: string
          enum:
            - UNASSIGNED_VERB
            - CREATE
            - GET
            - DELETE
          default: UNASSIGNED_VERB
      tags:
        - AuthService
  /apis/v2beta1/experiments:
    get:
      summary: >-
        Finds all experiments. Supports pagination, and sorting on certain
        fields.
      operationId: ExperimentService_ListExperiments
      responses:
        '200':
          description: A successful response.
          schema:
            $ref: '#/definitions/v2beta1ListExperimentsResponse'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/runtimeError'
      parameters:
        - name: page_token
          description: >-
            A page token to request the next page of results. The token is
            acquried

            from the nextPageToken field of the response from the previous

            ListExperiments call or can be omitted when fetching the first page.
          in: query
          required: false
          type: string
        - name: page_size
          description: |-
            The number of experiments to be listed per page. If there are more
            experiments than this number, the response message will contain a
            nextPageToken field you can use to fetch the next page.
          in: query
          required: false
          type: integer
          format: int32
        - name: sort_by
          description: |-
            Can be format of "field_name", "field_name asc" or "field_name desc"
            Ascending by default.
          in: query
          required: false
          type: string
        - name: filter
          description: >-
            A url-encoded, JSON-serialized Filter protocol buffer (see

            [filter.proto](https://github.com/kubeflow/pipelines/blob/master/backend/api/v2beta1/api/filter.proto)).
          in: query
          required: false
          type: string
        - name: namespace
          description: Which namespace to filter the experiments on.
          in: query
          required: false
          type: string
      tags:
        - ExperimentService
    post:
      summary: Creates a new experiment.
      operationId: ExperimentService_CreateExperiment
      responses:
        '200':
          description: A successful response.
          schema:
            $ref: '#/definitions/v2beta1Experiment'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/runtimeError'
      parameters:
        - name: body
          description: The experiment to be created.
          in: body
          required: true
          schema:
            $ref: '#/definitions/v2beta1Experiment'
      tags:
        - ExperimentService
  /apis/v2beta1/experiments/{experiment_id}:
    get:
      summary: Finds a specific experiment by ID.
      operationId: ExperimentService_GetExperiment
      responses:
        '200':
          description: A successful response.
          schema:
            $ref: '#/definitions/v2beta1Experiment'
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/runtimeError'
      parameters:
        - name: experiment_id
          description: The ID of the experiment to be retrieved.
          in: path
          required: true
          type: string
      tags:
        - ExperimentService
    delete:
      summary: >-
        Deletes an experiment without deleting the experiment's runs and
        recurring 

        runs. To avoid unexpected behaviors, delete an experiment's runs and
        recurring 

        runs before deleting the experiment.
      operationId: ExperimentService_DeleteExperiment
      responses:
        '200':
          description: A successful response.
          schema:
            properties: {}
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/runtimeError'
      parameters:
        - name: experiment_id
          description: The ID of the experiment to be deleted.
          in: path
          required: true
          type: string
      tags:
        - ExperimentService
  /apis/v2beta1/experiments/{experiment_id}:archive:
    post:
      summary: Archives an experiment and the experiment's runs and recurring runs.
      operationId: ExperimentService_ArchiveExperiment
      responses:
        '200':
          description: A successful response.
          schema:
            properties: {}
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/runtimeError'
      parameters:
        - name: experiment_id
          description: The ID of the experiment to be archived.
          in: path
          required: true
          type: string
      tags:
        - ExperimentService
  /apis/v2beta1/experiments/{experiment_id}:unarchive:
    post:
      summary: >-
        Restores an archived experiment. The experiment's archived runs and
        recurring

        runs will stay archived.
      operationId: ExperimentService_UnarchiveExperiment
      responses:
        '200':
          description: A successful response.
          schema:
            properties: {}
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/runtimeError'
      parameters:
        - name: experiment_id
          description: The ID of the experiment to be restored.
          in: path
          required: true
          type: string
      tags:
        - ExperimentService
  /apis/v2beta1/healthz:
    get:
      summary: Get healthz data.
      operationId: HealthzService_GetHealthz
      responses:
        '200':
          description: A successful response.
          schema:
