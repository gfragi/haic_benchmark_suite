paths:
  /apis/v2beta1/auth:
    get:
      operationId: AuthService_Authorize
      responses:
        '200':
          description: A successful response.
          schema:
            properties: {}
        default:
          description: An unexpected error response.
          schema:
            $ref: '#/definitions/runtimeError'
      parameters:
        - name: namespace
          in: query
          required: false
          type: string
        - name: resources
          in: query
