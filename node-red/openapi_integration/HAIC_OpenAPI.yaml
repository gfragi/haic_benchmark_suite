    TAMSUSResponses:
      properties:
        sus_q1:
          type: integer
          maximum: 5
          minimum: 1
          title: Sus Q1
          description: I think that I would like to use this system frequently.
        sus_q2:
          type: integer
          maximum: 5
          minimum: 1
          title: Sus Q2
          description: I found the system unnecessarily complex.
        sus_q3:
          type: integer
          maximum: 5
          minimum: 1
          title: Sus Q3
          description: I thought the system was easy to use.
        sus_q4:
          type: integer
          maximum: 5
          minimum: 1
          title: Sus Q4
          description: I think that I would need the support of a technical person to be able to use this system.
        sus_q5:
          type: integer
          maximum: 5
          minimum: 1
          title: Sus Q5
          description: I found the various functions in this system were well integrated.
        sus_q6:
          type: integer
          maximum: 5
          minimum: 1
          title: Sus Q6
          description: I thought there was too much inconsistency in this system.
        sus_q7:
          type: integer
          maximum: 5
          minimum: 1
          title: Sus Q7
          description: I would imagine that most people would learn to use this system very quickly.
        sus_q8:
          type: integer
          maximum: 5
          minimum: 1
          title: Sus Q8
          description: I found the system to be very difficult to use.
        sus_q9:
          type: integer
          maximum: 5
          minimum: 1
          title: Sus Q9
          description: I felt very confident using the system.
        sus_q10:
          type: integer
          maximum: 5
          minimum: 1
          title: Sus Q10
          description: I needed to learn many things before I could get going with this system.
      type: object
      required:
        - sus_q1
        - sus_q2
        - sus_q3
        - sus_q4
        - sus_q5
        - sus_q6
        - sus_q7
        - sus_q8
        - sus_q9
        - sus_q10
