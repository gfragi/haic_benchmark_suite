openapi: 3.1.0
info:
  title: Human-AI Benchmark Suite
  description: An application to evaluate Human-AI collaboration.
  version: 1.0.0
paths:
  /logs/upload:
    post:
      tags:
        - Logs
      summary: Upload Log
      operationId: upload_log_logs_upload_post
      parameters:
        - name: configuration_id
          in: query
          required: true
          schema:
            type: integer
            title: Configuration Id
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_log_logs_upload_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /logs/{config_id}:
    get:
      tags:
        - Logs
      summary: List Logs
      operationId: list_logs_logs__config_id__get
      parameters:
        - name: config_id
          in: path
          required: true
          schema:
            type: integer
            title: Config Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /logs/download/{config_id}/{log_name}:
    get:
      tags:
        - Logs
      summary: Download Log
      operationId: download_log_logs_download__config_id___log_name__get
      parameters:
        - name: config_id
          in: path
          required: true
          schema:
            type: integer
            title: Config Id
        - name: log_name
          in: path
          required: true
          schema:
            type: string
            title: Log Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /logs/{config_id}/{log_name}:
    delete:
      tags:
        - Logs
      summary: Delete Log
      operationId: delete_log_logs__config_id___log_name__delete
      parameters:
        - name: config_id
          in: path
          required: true
          schema:
            type: integer
            title: Config Id
        - name: log_name
          in: path
          required: true
          schema:
            type: string
            title: Log Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /logs/register:
    post:
      tags:
        - Logs
      summary: Register Log
      operationId: register_log_logs_register_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogSchema'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /configuration/new:
    post:
      tags:
        - Configuration
      summary: Create Configuration
      operationId: create_configuration_configuration_new_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationConfigSchema'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationConfigSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /configuration/{configuration_id}:
    get:
      tags:
        - Configuration
      summary: Get Configuration
      operationId: get_configuration_configuration__configuration_id__get
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema:
            type: integer
            title: Configuration Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationConfigSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /configuration/list/:
    get:
      tags:
        - Configuration
      summary: Get All Configurations
      operationId: get_all_configurations_configuration_list__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/EvaluationConfigSchema'
                type: array
                title: Response Get All Configurations Configuration List  Get
  /configuration/update/{configuration_id}:
    put:
      tags:
        - Configuration
      summary: Update Configuration
      operationId: update_configuration_configuration_update__configuration_id__put
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema:
            type: integer
            title: Configuration Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationConfigSchema'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationConfigSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /configuration/delete/{configuration_id}:
    delete:
      tags:
        - Configuration
      summary: Delete Configuration
      operationId: delete_configuration_configuration_delete__configuration_id__delete
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema:
            type: integer
            title: Configuration Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: >-
                  Response Delete Configuration Configuration Delete 
                  Configuration Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /evaluate/{configuration_id}:
    post:
      tags:
        - Evaluation
      summary: Evaluate Config
      operationId: evaluate_config_evaluate__configuration_id__post
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema:
            type: integer
            title: Configuration Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /evaluate/metrics:
    get:
      tags:
        - Evaluation
      summary: Get Metrics
      operationId: get_metrics_evaluate_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  $ref: '#/components/schemas/MetricGroupResponse'
                type: object
                title: Response Get Metrics Evaluate Metrics Get
  /results/{configuration_id}:
    get:
      tags:
        - Results
      summary: Get Evaluation Results
      operationId: get_evaluation_results_results__configuration_id__get
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema:
            type: integer
            title: Configuration Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /results/{configuration_id}/{result_id}:
    get:
      tags:
        - Results
      summary: Get Evaluation Result
      operationId: get_evaluation_result_results__configuration_id___result_id__get
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema:
            type: integer
            title: Configuration Id
        - name: result_id
          in: path
          required: true
          schema:
            type: integer
            title: Result Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /results/{configuration_id}/group/{group_name}:
    get:
      tags:
        - Results
      summary: Get Evaluation Results By Group
      operationId: >-
        get_evaluation_results_by_group_results__configuration_id__group__group_name__get
      parameters:
        - name: configuration_id
          in: path
          required: true
          schema:
            type: integer
            title: Configuration Id
        - name: group_name
          in: path
          required: true
          schema:
            type: string
            title: Group Name
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /reporting/aggregate-by-date:
    get:
      tags:
        - Reporting
      summary: Get Aggregated Results
      operationId: get_aggregated_results_reporting_aggregate_by_date_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /reporting/time-series-data:
    get:
      tags:
        - Reporting
      summary: Get Time Series Data
      operationId: get_time_series_data_reporting_time_series_data_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /reporting/generate-report:
    get:
      tags:
        - Reporting
      summary: Generate Pdf Report
      operationId: generate_pdf_report_reporting_generate_report_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /log-generator/generate:
    get:
      tags:
        - Log Generator
      summary: Generate Log Endpoint
      operationId: generate_log_endpoint_log_generator_generate_get
      parameters:
        - name: app_type
          in: query
          required: false
          schema:
            type: string
            description: Type of application to generate logs for
            default: radiologist
            title: App Type
          description: Type of application to generate logs for
        - name: count
          in: query
          required: false
          schema:
            type: integer
            description: Number of log entries to generate
            default: 100
            title: Count
          description: Number of log entries to generate
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            description: Start date of the log period
            default: '2024-02-10T13:00:00Z'
            title: Start Date
          description: Start date of the log period
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            description: End date of the log period
            default: '2024-05-10T13:00:00Z'
            title: End Date
          description: End date of the log period
        - name: ai_model_version_range
          in: query
          required: false
          schema:
            type: string
            description: Range of model versions
            default: 1.0.0 - 3.0.0
            title: Ai Model Version Range
          description: Range of model versions
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /log-generator/download/:
    get:
      tags:
        - Log Generator
      summary: Download Log
      operationId: download_log_log_generator_download__get
      parameters:
        - name: file_path
          in: query
          required: true
          schema:
            type: string
            title: File Path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AIModelData:
      properties:
        ai_model_name:
          anyOf:
            - type: string
            - type: 'null'
          title: Ai Model Name
        training_data:
          anyOf:
            - type: string
            - type: 'null'
          title: Training Data
        ai_model_size:
          anyOf:
            - type: string
            - type: 'null'
          title: Ai Model Size
        inference_time_seconds:
          anyOf:
            - type: integer
            - type: 'null'
          title: Inference Time Seconds
        deployment_details:
          anyOf:
            - type: string
            - type: 'null'
          title: Deployment Details
      type: object
      title: AIModelData
    AlertData:
      properties:
        alert_details:
          anyOf:
            - type: string
            - type: 'null'
          title: Alert Details
        alert_time:
          anyOf:
            - type: string
            - type: 'null'
          title: Alert Time
        load_setpoint:
          anyOf:
            - type: integer
            - type: 'null'
          title: Load Setpoint
        generation_setpoint:
          anyOf:
            - type: integer
            - type: 'null'
          title: Generation Setpoint
        predicted_security_state:
          anyOf:
            - type: string
            - type: 'null'
          title: Predicted Security State
        confidence_bound:
          anyOf:
            - type: number
            - type: 'null'
          title: Confidence Bound
      type: object
      title: AlertData
    Body_upload_log_logs_upload_post:
      properties:
        file:
          type: string
          format: binary
          title: File
      type: object
      required:
        - file
      title: Body_upload_log_logs_upload_post
    EvaluationConfigSchema:
      properties:
        id:
          anyOf:
            - type: integer
            - type: 'null'
          title: Id
        application_name:
          type: string
          title: Application Name
        ai_model_name:
          type: string
          title: Ai Model Name
        ai_model_type:
          type: string
          title: Ai Model Type
          description: >-
            One of: Classification, Regression, Clustering, XAI, Swarm Learning,
            Active Learning, Other
        metrics:
          items: {}
          type: array
          title: Metrics
        evaluation_date:
          type: string
          format: date-time
          title: Evaluation Date
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        config_type:
          type: string
          title: Config Type
          description: Either 'specific' or 'generic'
        evaluation_status:
          type: string
          title: Evaluation Status
          description: Current status of the evaluation
          default: pending
      type: object
      required:
        - application_name
        - ai_model_name
        - ai_model_type
        - metrics
        - config_type
      title: EvaluationConfigSchema
      examples:
        - ai_model_name: TumorDetectionModelV1
          ai_model_type: Classification
          application_name: RadiologyApp
          config_type: specific
          description: Evaluation of Tumor Detection Model in RadiologyApp
          evaluation_date: '2025-03-20T15:26:39.515693'
          evaluation_status: pending
          metrics:
            - metric_name: Prediction Accuracy
            - metric_name: Response Time
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    InteractionData:
      properties:
        image_id:
          anyOf:
            - type: string
            - type: 'null'
          title: Image Id
        presentation_time:
          anyOf:
            - type: string
            - type: 'null'
          title: Presentation Time
        validation_data:
          anyOf:
            - $ref: '#/components/schemas/ValidationData'
            - type: 'null'
        review_data:
          anyOf:
            - $ref: '#/components/schemas/ReviewData'
            - type: 'null'
        application_id:
          anyOf:
            - type: string
            - type: 'null'
          title: Application Id
        justification_documents:
          anyOf:
            - type: string
            - type: 'null'
          title: Justification Documents
        submission_time:
          anyOf:
            - type: string
            - type: 'null'
          title: Submission Time
        load_generation_data:
          anyOf:
            - items:
                additionalProperties:
                  anyOf:
                    - type: string
                    - type: integer
                    - type: number
                type: object
              type: array
            - type: 'null'
          title: Load Generation Data
        alert_data:
          anyOf:
            - $ref: '#/components/schemas/AlertData'
            - items:
                $ref: '#/components/schemas/AlertData'
              type: array
            - type: 'null'
          title: Alert Data
      type: object
      title: InteractionData
    LogSchema:
      properties:
        session_id:
          type: string
          title: Session Id
        user_id:
          type: string
          title: User Id
        ai_model_version:
          anyOf:
            - type: string
            - type: 'null'
          title: Ai Model Version
        app_version:
          type: string
          title: App Version
        start_time:
          type: string
          title: Start Time
        end_time:
          type: string
          title: End Time
        interaction_data:
          anyOf:
            - $ref: '#/components/schemas/InteractionData'
            - type: 'null'
        retrain_events:
          anyOf:
            - items:
                $ref: '#/components/schemas/RetrainEvent'
              type: array
            - type: 'null'
          title: Retrain Events
        performance_infrastructure:
          anyOf:
            - $ref: '#/components/schemas/PerformanceInfrastructure'
            - type: 'null'
        performance_logs:
          anyOf:
            - $ref: '#/components/schemas/PerformanceLogs'
            - type: 'null'
        ai_model_data:
          anyOf:
            - $ref: '#/components/schemas/AIModelData'
            - type: 'null'
      type: object
      required:
        - session_id
        - user_id
        - app_version
        - start_time
        - end_time
      title: LogSchema
    MetricGroupResponse:
      properties:
        group_description:
          anyOf:
            - type: string
            - type: 'null'
          title: Group Description
          default: No description
        metrics:
          items:
            $ref: '#/components/schemas/MetricResponse'
          type: array
          title: Metrics
      type: object
      required:
        - metrics
      title: MetricGroupResponse
    MetricResponse:
      properties:
        name:
          type: string
          title: Name
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
          default: No description
      type: object
      required:
        - name
      title: MetricResponse
    PerformanceInfrastructure:
      properties:
        hardware_specifications:
          anyOf:
            - type: string
            - type: 'null'
          title: Hardware Specifications
        software_stack:
          anyOf:
            - type: string
            - type: 'null'
          title: Software Stack
        network_conditions:
          anyOf:
            - type: string
            - type: 'null'
          title: Network Conditions
      type: object
      title: PerformanceInfrastructure
    PerformanceLogs:
      properties:
        processing_time_seconds:
          anyOf:
            - additionalProperties:
                type: integer
              type: object
            - type: 'null'
          title: Processing Time Seconds
        resource_utilization:
          anyOf:
            - additionalProperties:
                type: integer
              type: object
            - type: 'null'
          title: Resource Utilization
        human_effort_seconds:
          anyOf:
            - additionalProperties:
                type: integer
              type: object
            - type: 'null'
          title: Human Effort Seconds
      type: object
      title: PerformanceLogs
    RetrainEvent:
      properties:
        retraining_time:
          anyOf:
            - type: string
            - type: 'null'
          title: Retraining Time
        initial_metrics:
          anyOf:
            - additionalProperties:
                type: number
              type: object
            - type: 'null'
          title: Initial Metrics
        post_retraining_metrics:
          anyOf:
            - additionalProperties:
                type: number
              type: object
            - type: 'null'
          title: Post Retraining Metrics
        retraining_details:
          anyOf:
            - $ref: '#/components/schemas/RetrainingDetails'
            - type: 'null'
      type: object
      title: RetrainEvent
    RetrainingDetails:
      properties:
        time_taken_seconds:
          anyOf:
            - type: integer
            - type: 'null'
          title: Time Taken Seconds
        data_used:
          anyOf:
            - type: string
            - type: 'null'
          title: Data Used
        ai_model_version_after_retraining:
          anyOf:
            - type: string
            - type: 'null'
          title: Ai Model Version After Retraining
      type: object
      title: RetrainingDetails
    ReviewData:
      properties:
        review_time_seconds:
          anyOf:
            - type: integer
            - type: 'null'
          title: Review Time Seconds
        detections_confirmed:
          anyOf:
            - type: integer
            - type: 'null'
          title: Detections Confirmed
        false_positives_identified:
          anyOf:
            - type: integer
            - type: 'null'
          title: False Positives Identified
        false_negatives_identified:
          anyOf:
            - type: integer
            - type: 'null'
          title: False Negatives Identified
        feedback_details:
          anyOf:
            - type: string
            - type: 'null'
          title: Feedback Details
        time_spent_on_corrections_seconds:
          anyOf:
            - type: integer
            - type: 'null'
          title: Time Spent On Corrections Seconds
        discrepancy_rate:
          anyOf:
            - type: number
            - type: 'null'
          title: Discrepancy Rate
        operator_decision:
          anyOf:
            - type: string
            - type: 'null'
          title: Operator Decision
        feedback_time:
          anyOf:
            - type: string
            - type: 'null'
          title: Feedback Time
        insecure_instances_confirmed:
          anyOf:
            - type: integer
            - type: 'null'
          title: Insecure Instances Confirmed
        false_positives:
          anyOf:
            - type: integer
            - type: 'null'
          title: False Positives
        false_negatives:
          anyOf:
            - type: integer
            - type: 'null'
          title: False Negatives
        user_satisfaction:
          anyOf:
            - type: string
            - type: 'null'
          title: User Satisfaction
        feedback_provided:
          anyOf:
            - type: string
            - type: 'null'
          title: Feedback Provided
        human_confirmation_rate:
          anyOf:
            - type: number
            - type: 'null'
          title: Human Confirmation Rate
      type: object
      title: ReviewData
    SystemMetrics:
      properties:
        accuracy:
          anyOf:
            - type: number
            - type: 'null'
          title: Accuracy
        precision:
          anyOf:
            - type: number
            - type: 'null'
          title: Precision
        recall:
          anyOf:
            - type: number
            - type: 'null'
          title: Recall
      type: object
      title: SystemMetrics
    ValidationData:
      properties:
        ai_detection_results:
          anyOf:
            - type: string
            - type: 'null'
          title: Ai Detection Results
        confidence_scores:
          anyOf:
            - additionalProperties:
                type: number
              type: object
            - type: 'null'
          title: Confidence Scores
        validation_results:
          anyOf:
            - type: string
            - type: 'null'
          title: Validation Results
        confidence_level:
          anyOf:
            - type: number
            - type: 'null'
          title: Confidence Level
        processing_time_seconds:
          anyOf:
            - type: integer
            - type: 'null'
          title: Processing Time Seconds
        validation_time:
          anyOf:
            - type: string
            - type: 'null'
          title: Validation Time
        system_metrics:
          anyOf:
            - $ref: '#/components/schemas/SystemMetrics'
            - type: 'null'
      type: object
      title: ValidationData
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError

