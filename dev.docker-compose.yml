  #   env_file: .env
  #   depends_on:
  #     - db
  #   # NOTE: Volume is required because alembic is not installed in the base image
  #   volumes:
  #     - ./backend:/app

  backend:
    build:
      context: .
      dockerfile: ./Dockerfile.backend
    container_name: haic-backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      # - minio
    # NOTE: Volume is required for changes to take effect
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile.frontend
    container_name: haic-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
  
  # Run only for the integration with HAIC
  node-red:
    image: nodered/node-red
    container_name: haic-node-red
    ports:
      - "1880:1880"
    volumes:
      - ./node-red:/data
    environment:
      TZ: "Europe/Athens"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
