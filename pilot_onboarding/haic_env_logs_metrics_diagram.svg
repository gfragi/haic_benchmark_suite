<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="980" viewBox="0 0 820 980">
  <defs>
    <style>
      .title { font: 700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#111; }
      .sub { font: 500 14px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#333; }
      .box { fill:#ffffff; stroke:#1f2937; stroke-width:2; rx:18; ry:18; }
      .label { font: 700 16px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#111; }
      .text { font: 500 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#374151; }
      .mono { font: 600 12px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace; fill:#111; }
      .arrow { stroke:#111827; stroke-width:2.5; fill:none; }
      .hint { font: 500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#6b7280; }
      .pill { fill:#f3f4f6; stroke:#d1d5db; stroke-width:1.5; rx:12; ry:12; }
      .pillText { font: 600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; fill:#111; }
    </style>

        <marker id="arrowHead" viewBox="0 0 12 12" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#111827"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="410" y="48" text-anchor="middle" class="title">How your pilot logs become dashboard metrics</text>
  <text x="410" y="74" text-anchor="middle" class="sub">A simple, repeatable mapping — no change to your business logic</text>

  <!-- 1) Pilot workflow -->
  <rect x="110" y="110" width="600" height="140" class="box"/>
  <text x="410" y="145" text-anchor="middle" class="label">1) Pilot workflow (what happens in reality)</text>
  <text x="410" y="172" text-anchor="middle" class="text">Example: Citizen submits → AI checks → Operator verifies (sometimes)</text>
  <text x="410" y="200" text-anchor="middle" class="hint">You describe the steps once, in plain language</text>

  <!-- Arrow -->
  <path d="M 410 255 L 410 300" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- 2) Environment contract -->
  <rect x="110" y="310" width="600" height="190" class="box"/>
  <text x="410" y="345" text-anchor="middle" class="label">2) Environment contract (shared vocabulary)</text>

  <!-- pills -->
  <rect x="150" y="368" width="150" height="30" class="pill"/>
  <text x="225" y="388" text-anchor="middle" class="pillText">Actors</text>

  <rect x="335" y="368" width="150" height="30" class="pill"/>
  <text x="410" y="388" text-anchor="middle" class="pillText">Objects</text>

  <rect x="520" y="368" width="150" height="30" class="pill"/>
  <text x="595" y="388" text-anchor="middle" class="pillText">Affordances</text>

  <text x="225" y="420" text-anchor="middle" class="text">human / ai / system</text>
  <text x="410" y="420" text-anchor="middle" class="text">ticket / image / application</text>
  <text x="595" y="420" text-anchor="middle" class="text">evaluate, verify, accept…</text>

  <text x="410" y="455" text-anchor="middle" class="hint">This makes different pilots comparable without forcing identical schemas</text>
  <text x="410" y="485" text-anchor="middle" class="mono">action_map:  pilot_action  →  canonical_affordance</text>

  <!-- Arrow -->
    <path d="M 410 505 L 410 555" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- 3) Pilot logs -->
  <rect x="110" y="565" width="600" height="210" class="box"/>
  <text x="410" y="600" text-anchor="middle" class="label">3) Pilot logs (events you already produce)</text>

  <text x="410" y="630" text-anchor="middle" class="text">Each log is a list of events (“decisions”)</text>
  <text x="410" y="662" text-anchor="middle" class="mono">actor_type • action • timestamp • interaction_id</text>

  <text x="410" y="690" text-anchor="middle" class="hint">Timing fields enable the key plots:</text>

  <text x="260" y="720" text-anchor="middle" class="mono">latency_ms</text>
  <text x="260" y="742" text-anchor="middle" class="text">AI runtime (p50/p90/p95)</text>

  <text x="560" y="720" text-anchor="middle" class="mono">duration_s</text>
  <text x="560" y="742" text-anchor="middle" class="text">Human effort (avg/pctiles)</text>

  <text x="410" y="768" text-anchor="middle" class="hint">Payload stays pilot-owned (we store it but don’t enforce it)</text>

  <!-- Arrow -->
  <path d="M 410 780 L 410 825" class="arrow" marker-end="url(#arrowHead)"/>


  <!-- 4) Metrics -->
  <rect x="110" y="835" width="600" height="120" class="box"/>
  <text x="410" y="870" text-anchor="middle" class="label">4) Metrics &amp; comparisons (dashboard)</text>
  <text x="410" y="898" text-anchor="middle" class="text">Compute: latency percentiles, human effort, agreement (derived “correct”),</text>
  <text x="410" y="920" text-anchor="middle" class="text">and breakdowns by model/app/pilot_tag (when available)</text>

  <!-- Footer -->
  <text x="410" y="965" text-anchor="middle" class="hint">If the contract + mapping + timing fields are present, evaluation will work.</text>
</svg>
