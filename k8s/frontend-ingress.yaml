apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: benchmarking
  annotations:
    # Optional: rewrite all to “/”
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: hua-benchmarking.ddns.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
