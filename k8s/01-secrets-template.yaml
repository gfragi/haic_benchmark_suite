# Template for creating secrets. Copy this file to 01-secrets.yaml and fill in actual values
# DO NOT commit 01-secrets.yaml to git - add it to .gitignore
apiVersion: v1
kind: Secret
metadata:
  name: haic-benchmark-secret
  namespace: haic-benchmark
type: Opaque
stringData:
  # Database credentials
  DB_NAME: haic_benchmark
  DB_USER: haic_user
  DB_PASSWORD: "changeme123"  # CHANGE THIS

  # Full database connection string for backend
  DATABASE_URL: "postgresql://haic_user:changeme123@postgres.haic-benchmark.svc.cluster.local:5432/haic_benchmark"

  # MinIO (external) - update with your actual endpoint
  MINIO_ENDPOINT: "minio.example.com:9000"
  MINIO_SECURE: "true"
  MINIO_REGION: "us-east-1"
  MINIO_USERNAME: "minioadmin"
  MINIO_PASSWORD: "minioadmin"  # CHANGE THIS
  MINIO_BUCKET: "haic-benchmark"

  # Backend auth/API
  AUTH_URL: "https://keycloak.example.com"  # CHANGE THIS
---
apiVersion: v1
kind: Secret
metadata:
  name: haic-frontend-secret
  namespace: haic-benchmark
type: Opaque
stringData:
  # Frontend configuration
  VUE_APP_API_BASE_URL: "http://localhost:8000/api"  # Change to your backend URL
  VUE_APP_KEYCLOAK_URL: "https://keycloak.example.com"  # CHANGE THIS
  VUE_APP_KEYCLOAK_REALM: "your-realm"  # CHANGE THIS
  VUE_APP_KEYCLOAK_CLIENT_ID: "your-client-id"  # CHANGE THIS
