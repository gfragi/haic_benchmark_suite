apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: benchmarking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
      containers:
      - name: backend
        image: ghcr.io/gfragi/haic-backend:rollback
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: benchmarking-secret
              key: DATABASE_URL
        - name: AUTH_URL
          valueFrom:
            secretKeyRef:
              name: benchmarking-secret
              key: AUTH_URL
        - name: MINIO_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: benchmarking-secret
              key: MINIO_ENDPOINT
        - name: MINIO_SECURE
          valueFrom:
            secretKeyRef:
              name: benchmarking-secret
              key: MINIO_SECURE
        - name: MINIO_REGION
          valueFrom:
            secretKeyRef:
              name: benchmarking-secret
              key: MINIO_REGION
        - name: MINIO_USERNAME
          valueFrom:
            secretKeyRef:
              name: benchmarking-secret
              key: MINIO_USERNAME
        - name: MINIO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: benchmarking-secret
              key: MINIO_PASSWORD
        - name: MINIO_BUCKET
          valueFrom:
            secretKeyRef:
              name: benchmarking-secret
              key: MINIO_BUCKET
