# Development overrides for docker-compose
# This file is automatically loaded when running docker-compose
# It overrides settings for local development

version: '3.8'

# Override environment files to use development settings
services:
  backend:
    env_file:
      - .env.development
    volumes:
      # Mount source code for hot reloading during development
      # Mount specific directories to avoid overwriting entrypoint.sh
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - /app/__pycache__

  frontend:
    env_file:
      - .env.development
    volumes:
      # Mount source code for hot reloading
      - ./frontend:/app
      - /app/node_modules

  # Optional: Add development tools
